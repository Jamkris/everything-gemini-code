name: Auto Release on Main

on:
  workflow_run:
    workflows: ['Gemini CI']
    types:
      - completed
    branches:
      - main

permissions:
  contents: write

jobs:
  bump-and-release:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      !startsWith(github.event.workflow_run.head_commit.message, 'chore: bump extension version')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Setup Git
        run: |
          git config --global user.name "github-release-bot"
          git config --global user.email "github-release-bot@users.noreply.github.com"

      - name: Bump, Commit, Tag, and Push
        id: bump
        run: |
          CURRENT_VERSION=$(grep -oE '"version": *"[^"]*"' gemini-extension.json | head -n1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          IFS='.' read -ra ADDR <<< "$CURRENT_VERSION"
          PATCH=${ADDR[2]}

          while true; do
            PATCH=$((PATCH + 1))
            NEW_VERSION="${ADDR[0]}.${ADDR[1]}.$PATCH"
            
            if git rev-parse "refs/tags/v$NEW_VERSION" >/dev/null 2>&1; then
              echo "Tag v$NEW_VERSION already exists locally, trying next..."
              continue
            fi
            
            if git ls-remote --tags origin "refs/tags/v$NEW_VERSION" | grep -q "refs/tags/v$NEW_VERSION"; then
              echo "Tag v$NEW_VERSION already exists on remote, trying next..."
              continue
            fi
            
            break
          done

          echo "Bumping version $CURRENT_VERSION -> $NEW_VERSION"

          # Update version in files
          sed -i "s/\"version\": *\"[^\"]*\"/\"version\": \"$NEW_VERSION\"/" gemini-extension.json
          sed -i "s/\"version\": *\"[^\"]*\"/\"version\": \"$NEW_VERSION\"/" package.json

          # Commit and Tag
          git add gemini-extension.json package.json
          git commit -m "chore: bump extension version to $NEW_VERSION"
          git push origin main
          git tag "v$NEW_VERSION"
          git push origin "v$NEW_VERSION"

          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "old_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

      - name: Generate Changelog
        id: changelog
        run: |
          PREV_TAG="v${{ steps.bump.outputs.old_version }}"
          if git rev-parse "$PREV_TAG" >/dev/null 2>&1; then
            # Get commits from previous tag to HEAD^ (excluding the bump commit we just made)
            COMMITS=$(git log --pretty=format:"- %s" ${PREV_TAG}..HEAD^)
          else
            COMMITS=$(git log --pretty=format:"- %s" HEAD^)
          fi
          echo "commits<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.new_version }}
          body: |
            ## Changes
            ${{ steps.changelog.outputs.commits }}
          generate_release_notes: false
          draft: false
          prerelease: false
