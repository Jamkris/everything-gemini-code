name: Release

on:
  pull_request:
    types:
      - closed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    if: >
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'chore/release-v')) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate and Extract Version
        id: version
        run: |
          EXTENSION_VERSION=$(grep -oE '"version": *"[^"]*"' gemini-extension.json | head -n1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          if [[ -z "$EXTENSION_VERSION" ]]; then
            echo "::error::Could not extract version from gemini-extension.json"
            exit 1
          fi

          echo "Detected extension version: $EXTENSION_VERSION"
          echo "RELEASE_TAG=v$EXTENSION_VERSION" >> $GITHUB_OUTPUT

          # Create local tag to be pushed later
          git config --global user.name "github-release-bot"
          git config --global user.email "github-release-bot@users.noreply.github.com"
          git tag "v$EXTENSION_VERSION"
          git push origin "v$EXTENSION_VERSION"

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s" HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s" ${PREV_TAG}..HEAD)
          fi
          echo "commits<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          body: |
            ## Changes
            ${{ steps.changelog.outputs.commits }}
          generate_release_notes: false
          draft: false
          prerelease: false
